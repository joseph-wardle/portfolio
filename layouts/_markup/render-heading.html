{{- /* render-heading.html — headings keep their auto id (so deep-links / URL
   fragments stay valid) and gain a subtle hover anchor. Replaces Blowfish's
   tailwind-flavored hook so no stray utility classes leak into the markup. */ -}}
<h{{ .Level }} id="{{ .Anchor }}">
  {{- .Text -}}
  <a class="hanchor" href="#{{ .Anchor }}" aria-label="Permalink to this section">#</a>
</h{{ .Level }}>
