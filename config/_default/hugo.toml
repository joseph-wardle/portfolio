# -- Site Configuration --

theme = "blowfish" # UNCOMMENT THIS LINE
baseURL = "https://josephwardle.com/"
defaultContentLanguage = "en"

# pluralizeListTitles = "true" # hugo function useful for non-english languages, find out more in  https://gohugo.io/getting-started/configuration/#pluralizelisttitles

enableRobotsTXT = true
summaryLength = 0

buildDrafts = false
buildFuture = false

enableEmoji = true

# `track` is a front-matter param, not a taxonomy (ADR-002). `tags` stays as
# front-matter data (used in OG article:tag) but generates no term pages, so
# there are no taxonomy/term page kinds and home/page/section cover every kind.
# Top-level scalar: must sit above the first [table] header or TOML nests it.
disableKinds = ["taxonomy", "term"]

# googleAnalytics = "G-XXXXXXXXX"

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  # Search dropped (gate-1 decision) → no JSON index. RSS kept for feed parity.
  home = ["HTML", "RSS"]

# Own markup config so rendering survives Blowfish removal (increment 6).
[markup]
  [markup.goldmark.renderer]
    unsafe = true # in-content raw HTML (shortcode output, embeds)
  # Server-side math (ADR-006): transform.ToMath renders KaTeX at build time
  # via _markup/render-passthrough.html — zero client JS. Delimiters match the
  # content: inline \( \), block $$ $$ and \[ \].
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)']]
  # Class-based syntax highlighting → one Chroma stylesheet in slate.css.
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
