name: Build and deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.92.1
      GO_VERSION: 1.25.1
      HUGO_VERSION: 0.148.2
      NODE_VERSION: 22.18.0
      TZ: America/Denver
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Emulator WASM build ─────────────────────────────────────────────
      # The rgb emulator lives in a separate repository.  We check it out,
      # compile it to WebAssembly with wasm-pack, and copy the two generated
      # files into static/emulator/ so Hugo can serve them at /emulator/.

      - name: Checkout rgb emulator
        uses: actions/checkout@v5
        with:
          repository: joseph-wardle/rgb
          path: rgb-src

      - name: Install Rust (stable, wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rgb-src/target
          key: cargo-wasm-${{ hashFiles('rgb-src/Cargo.lock') }}
          restore-keys: cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build emulator WASM module
        run: |
          cd rgb-src/rgb_web
          wasm-pack build --target web --out-dir pkg
          mkdir -p "$GITHUB_WORKSPACE/static/emulator"
          cp pkg/rgb_web.js pkg/rgb_web_bg.wasm "$GITHUB_WORKSPACE/static/emulator/"

      # ── Hugo build ──────────────────────────────────────────────────────

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Optional: Dart Sass if your theme/site transpiles SCSS
      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          mkdir -p "${HOME}/.local"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo (extended)
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build site
        run: |
          # ensure Hugo's image cache uses a temp dir (faster in Actions)
          printf "[caches]\n  [caches.images]\n    dir = ':cacheDir/images'\n" >> hugo.toml
          hugo --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
